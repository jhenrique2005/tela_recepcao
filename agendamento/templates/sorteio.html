{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grande Ganhador!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --gold: #e8c050;
      --gold-light: #f7e08a;
      --gold-dark: #a8872a;
      --bg-deep: #0a0812;
      --bg-card: #110f1e;
      --roller-bg: #07050f;
      --text-light: #f0e8d0;
      --text-muted: #8a7f9a;
      --purple: #6c3fbf;
    }



    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: var(--bg-deep);
      font-family: 'Lato', sans-serif;
      color: var(--text-light);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    #status-text {
      font-size: 1.9rem;
      padding-bottom: 15px;
    }
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--dur, 3s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: .08;
        transform: scale(1);
      }
      50% {
        opacity: .55;
        transform: scale(1.4);
      }
    }

    /* Ajustado o Z-INDEX para ficar ATRÁS do card (z-index: 10), mas na frente do fundo */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5; 
    }

    .card {
      position: relative;
      z-index: 10; /* Garante que o card e o texto fiquem acima dos confetes */
      width: min(640px, 95vw);
      background: var(--bg-card);
      border-radius: 28px;
      padding: 48px 40px 40px;
      border: 1px solid rgba(232, 192, 80, .28);
      box-shadow: 0 0 0 1px rgba(232, 192, 80, .06), 0 40px 80px rgba(0, 0, 0, .7), 0 0 50px rgba(232, 192, 80, .18);
      text-align: center;
      margin: 28px auto;
    }

    .trophy-row {
      font-size: 2.2rem;
      letter-spacing: 8px;
      margin-bottom: 14px;
    }

    h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.6rem, 5vw, 1.9rem);
      color: var(--gold);
      letter-spacing: 2px;
      text-shadow: 0 0 30px rgba(232, 192, 80, .4);
      margin-bottom: 6px;

    }

    .subtitle {
      font-family: 'Cinzel', serif;
      font-size: .75rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    .machine-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .machine-side {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 14px 10px;
      background: linear-gradient(180deg, #1e1a34, #110f1e);
      border: 1px solid rgba(232, 192, 80, .2);
    }

    .machine-side.left {
      border-radius: 14px 0 0 14px;
    }

    .machine-side.right {
      border-radius: 0 14px 14px 0;
    }

    .machine-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold-dark);
    }

    .machine-dot.lit {
      background: var(--gold);
      box-shadow: 0 0 12px var(--gold), 0 0 4px #fff;
      animation: blink-dot 1.1s ease-in-out infinite alternate;
    }

    @keyframes blink-dot {
      from { opacity: .4 }
      to { opacity: 1 }
    }

    .reel-panel {
      background: var(--roller-bg);
      border-top: 2px solid var(--gold-dark);
      border-bottom: 2px solid var(--gold-dark);
      padding: 0 8px;
      display: flex;
      gap: 6px;
      align-items: center;
      position: relative;
    }

    .reel-window {
      position: absolute;
      top: 50%;
      left: 8px;
      right: 8px;
      height: 76px;
      transform: translateY(-50%);
      border-top: 2px solid rgba(232, 192, 80, .6);
      border-bottom: 2px solid rgba(232, 192, 80, .6);
      background: linear-gradient(to bottom, rgba(232, 192, 80, .04), rgba(232, 192, 80, .12), rgba(232, 192, 80, .04));
      z-index: 4;
      pointer-events: none;
    }

    .digit-col {
      width: 64px;
      height: 76px;
      overflow: hidden;
      position: relative;
      z-index: 6;
    }

    .digit-strip {
      display: flex;
      flex-direction: column;
      align-items: center;
      will-change: transform;
    }

    .digit-item {
      height: 76px;
      line-height: 76px;
      font-size: 54px;
      font-weight: 900;
      font-family: 'Cinzel Decorative', serif;
      color: var(--gold);
      text-align: center;
    }

    .reel-sep {
      font-size: 28px;
      font-weight: 900;
      color: var(--gold-dark);
      z-index: 6;
    }

    .result-area {
      min-height: 68px;
      margin-top: 24px;
    }

    .winner-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.5rem;
      color: var(--gold-light);
      opacity: 0;
      transition: all 0.6s ease;
    }

    /* Animação épica de escala e pulso ao ganhar */
    .winner-name.visible {
      opacity: 1;
      animation: winPulse 1.5s ease-in-out infinite alternate;
    }

    @keyframes winPulse {
      0% { transform: scale(1.05); text-shadow: 0 0 10px rgba(247,224,138,0.5); }
      100% { transform: scale(1.15); text-shadow: 0 0 25px rgba(247,224,138,0.9), 0 0 10px var(--gold); }
    }

    .btn-primary {
      background: var(--gold);
      color: #0a0812;
      padding: 14px 52px;
      border-radius: 50px;
      border: none;
      font-family: 'Cinzel', serif;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 2px;
      transition: all 0.3s ease;
    }

    .btn-primary:hover:not(:disabled) {
      box-shadow: 0 0 20px rgba(232, 192, 80, 0.6);
      transform: translateY(-2px);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: none;
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 8px 20px;
      border-radius: 50px;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.3s ease;
    }

    .btn-secondary:hover {
      background: rgba(232, 192, 80, 0.1);
    }

    /* Efeito de balanço na máquina durante o giro */
    .spin-shake {
      animation: spinShake 0.4s ease-in-out infinite;
    }

    @keyframes spinShake {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px) rotate(0.5deg); }
    }

    .btn-group {
      padding-top: 20px;
    }
  </style>
</head>

<body>

  <div class="stars" id="stars"></div>
  <canvas id="confetti-canvas"></canvas>

  <div class="card" id="main-card">
    <div class="trophy-row">🏆</div>
    <h1>Grande Ganhador</h1>
    <p class="subtitle">Sorteio Oficial</p>

    <div class="machine-wrap" id="machine-wrapper">
      <div class="machine-side left">
        <div class="machine-dot lit"></div>
        <div class="machine-dot"></div>
        <div class="machine-dot lit"></div>
      </div>
      <div class="reel-panel" id="reel-panel">
        <div class="reel-window"></div>
      </div>
      <div class="machine-side right">
        <div class="machine-dot lit"></div>
        <div class="machine-dot"></div>
        <div class="machine-dot lit"></div>
      </div>
    </div>

    <div class="result-area">
      <p class="status-text" id="status-text">Pronto para sortear</p>
      <p class="winner-name" id="winner-name"></p>
    </div>

    <div class="btn-group">
      <button class="btn-primary" id="btn-sortear" onclick="iniciarSorteio()">✦ Sortear ✦</button>
      <br>
      <button class="btn-secondary" id="btn-reset" onclick="reiniciarSorteio()">Resetar</button>
    </div>
  </div>

  <script>
    // --- Estrelas de Fundo ---
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 100; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const sz = Math.random() * 2;
      s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random() * 100}%;left:${Math.random() * 100}%;--dur:${2 + Math.random() * 2}s;`;
      starsEl.appendChild(s);
    }

    // --- Configurações da Roleta ---
    const DIGITS = 3;
    const ITEM_H = 76;
    const REPS = 40;
    const STRIP_CYCLE = 10 * ITEM_H;
    const FULL_H = REPS * STRIP_CYCLE;
    const SPIN_FULL_MS = 2000;
    const STOP_DELAY = 600;
    const STOP_DUR = 800;

    const reels = [];
    let rolling = false;
    let rafId = null;
    const panel = document.getElementById('reel-panel');
    const machineWrapper = document.getElementById('machine-wrapper');

    // Criação dinâmica dos rolos
    for (let d = 0; d < DIGITS; d++) {
      if (d > 0) {
        const sep = document.createElement('div');
        sep.className = 'reel-sep';
        sep.textContent = '·';
        panel.appendChild(sep);
      }
      const col = document.createElement('div');
      col.className = 'digit-col';
      const strip = document.createElement('div');
      strip.className = 'digit-strip';
      for (let r = 0; r < REPS; r++) {
        for (let n = 0; n <= 9; n++) {
          const item = document.createElement('div');
          item.className = 'digit-item';
          item.textContent = n;
          strip.appendChild(item);
        }
      }
      col.appendChild(strip);
      panel.appendChild(col);
      reels.push({ strip, absPos: 0, velocity: 0, phase: 'idle' });
    }

    function applyStrip(reel, pos) {
      reel.strip.style.transform = `translateY(-${pos % FULL_H}px)`;
    }

    function tick(now) {
      if (!rolling) return;
      reels.forEach(reel => {
        if (reel.phase === 'spinning') {
          reel.absPos += reel.velocity;
          applyStrip(reel, reel.absPos);
        } else if (reel.phase === 'stopping') {
          const elapsed = now - reel.stopStartTime;
          const progress = Math.min(elapsed / STOP_DUR, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          const pos = reel.stopStartAbsPos + (reel.targetAbsPos - reel.stopStartAbsPos) * eased;
          applyStrip(reel, pos);
          if (progress >= 1) {
            reel.phase = 'stopped';
            if (reels.every(r => r.phase === 'stopped')) finalizarSorteio();
          }
        }
      });
      rafId = requestAnimationFrame(tick);
    }

    function computeTarget(reel, digit) {
      const targetInCycle = digit * ITEM_H;
      const currentMod = reel.absPos % STRIP_CYCLE;
      let diff = (targetInCycle - currentMod + STRIP_CYCLE) % STRIP_CYCLE;
      return reel.absPos + diff + (STRIP_CYCLE * 2);
    }

    // --- Motor de Confetes Dinâmicos ---
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    let confettiParticles = [];
    let confettiAnimationId = null;
    let alternarCoresConfete = ["#e8c050", "#f7e08a", "#a8872a", "#ffffff", "#8a7f9a", "#6c3fbf"];

    function redimensionarCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', redimensionarCanvas);
    redimensionarCanvas();

    class ParticulaConfete {
      constructor() {
        this.reset();
        // Inicializa em alturas aleatórias para preencher a tela imediatamente no início
        this.y = Math.random() * canvas.height - canvas.height;
      }

      reset() {
        this.x = Math.random() * canvas.width;
        this.y = -20;
        this.tamanho = Math.random() * 8 + 6;
        this.peso = Math.random() * 3 + 2;
        this.cor = alternarCoresConfete[Math.floor(Math.random() * alternarCoresConfete.length)];
        this.rotacao = Math.random() * 360;
        this.velocidadeRotacao = Math.random() * 4 - 2;
        this.velocidadeX = Math.random() * 2 - 1;
      }

      atualizar() {
        this.y += this.peso;
        this.x += this.velocidadeX;
        this.rotacao += this.velocidadeRotacao;

        // Se passar da base da tela, reseta para o topo criando o loop infinito desejado
        if (this.y > canvas.height) {
          this.reset();
        }
      }

      desenhar() {
        ctx.save();
        ctx.translate(this.x + this.tamanho / 2, this.y + this.tamanho / 2);
        ctx.rotate((this.rotacao * Math.PI) / 180);
        ctx.fillStyle = this.cor;
        ctx.fillRect(-this.tamanho / 2, -this.tamanho / 2, this.tamanho, this.tamanho);
        ctx.restore();
      }
    }

    function gerenciarLoopConfetes() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confettiParticles.forEach(p => {
        p.atualizar();
        p.desenhar();
      });
      confettiAnimationId = requestAnimationFrame(gerenciarLoopConfetes);
    }

    function pararLoopConfetes() {
      if (confettiAnimationId) {
        cancelAnimationFrame(confettiAnimationId);
        confettiAnimationId = null;
      }
      confettiParticles = [];
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    // --- Controle do Fluxo do Sorteio ---
    async function iniciarSorteio() {
      if (rolling) return;
      
      // Limpa os confetes do prêmio anterior caso o usuário clique em Sortear de novo sem dar Reset
      pararLoopConfetes(); 

      rolling = true;
      document.getElementById('btn-sortear').disabled = true;
      document.getElementById('winner-name').classList.remove('visible');
      document.getElementById('status-text').textContent = 'Sorteando...';
      machineWrapper.classList.add('spin-shake'); // Começa a tremer a máquina

      reels.forEach((r, i) => {
        r.phase = 'spinning';
        r.velocity = 25 + i * 5;
      });
      rafId = requestAnimationFrame(tick);

      try {
        const res = await fetch('/api/sortear');
        const data = await res.json();
        window._winnerName = `${data.primeiro_nome} ${data.sobrenome}`;
        const padded = String(data.id).padStart(DIGITS, '0');

        reels.forEach((reel, idx) => {
          setTimeout(() => {
            reel.targetAbsPos = computeTarget(reel, parseInt(padded[idx]));
            reel.stopStartAbsPos = reel.absPos;
            reel.stopStartTime = performance.now();
            reel.phase = 'stopping';
          }, SPIN_FULL_MS + idx * STOP_DELAY);
        });
      } catch (e) {
        alert("Erro ao buscar dados do sorteio.");
        reiniciarSorteio();
      }
    }

    function finalizarSorteio() {
      rolling = false;
      cancelAnimationFrame(rafId);
      machineWrapper.classList.remove('spin-shake'); // Para de tremer a máquina
      
      document.getElementById('status-text').textContent = 'Ganhador!';
      const nameEl = document.getElementById('winner-name');
      nameEl.textContent = window._winnerName;
      nameEl.classList.add('visible');
      
      // Cria a coleção de partículas de confete e inicia o loop contínuo
      for (let i = 0; i < 150; i++) {
        confettiParticles.push(new ParticulaConfete());
      }
      gerenciarLoopConfetes();
      
      document.getElementById('btn-sortear').disabled = false;
    }

    function reiniciarSorteio() {
      pararLoopConfetes();
      location.reload();
    }
  </script>
</body>

</html>
