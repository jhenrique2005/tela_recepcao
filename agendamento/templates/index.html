{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Identifique-se</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/estilo.css' %}">
</head>

<body class="bg-light">

    <!-- Uso de tag 'main' para definir a região principal da página -->
    <main class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="row w-100 bg-white p-4 shadow rounded">
            <div class="col-12">

                <!-- Título principal com h1 para hierarquia correta de leitores de tela -->
                <h1 class="text-center mb-4 fs-2">Cadastre-se</h1>

                <form action="/salvar/" method="POST">
                    {% csrf_token %}

                    <!-- IDENTIFICAÇÃO DA TELA (Oculto para leitores com aria-hidden) -->
                    <input type="hidden" name="tela" id="tela" aria-hidden="true">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <!-- Associação explícita usando 'for' e 'id' -->
                            <label for="primeiro_nome" class="form-label">Primeiro Nome</label>
                            <input type="text"
                                   id="primeiro_nome"
                                   name="primeiro_nome"
                                   class="form-control"
                                   placeholder="Digite seu primeiro nome"
                                   required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <!-- Associação explícita usando 'for' e 'id' -->
                            <label for="sobrenome" class="form-label">Sobrenome</label>
                            <input type="text"
                                   id="sobrenome"
                                   name="sobrenome"
                                   class="form-control"
                                   placeholder="Digite seu sobrenome"
                                   required>
                        </div>

                        <div class="col-12 mb-3">
                            <!-- Associação explícita usando 'for' e 'id' -->
                            <label for="data_nascimento" class="form-label">Data de nascimento</label>
                            <input type="date"
                                   id="data_nascimento"
                                   name="data_nascimento"
                                   class="form-control"
                                   required>
                        </div>
                    </div>

                    <!-- Agrupamento semântico para botões de rádio (Radio Buttons) -->
                    <fieldset class="mt-3 border-0 p-0">
                        <!-- O legend atua como a pergunta/contexto do grupo para o leitor de tela -->
                        <legend class="text-center h5 w-100 mb-3">Você é?</legend>

                        <div class="row mt-2">
                            <div class="col-6 col-md-4">
                                <div class="form-check">
                                    <input class="form-check-input"
                                           type="radio"
                                           id="tipo_adm"
                                           name="tipo_usuario"
                                           value="Administracao"
                                           required>
                                    <label class="form-check-label" for="tipo_adm">Administração</label>
                                </div>
                            </div>

                            <div class="col-6 col-md-4">
                                <div class="form-check">
                                    <input class="form-check-input"
                                           type="radio"
                                           id="tipo_masso"
                                           name="tipo_usuario"
                                           value="Massoterapia">
                                    <label class="form-check-label" for="tipo_masso">Massoterapia</label>
                                </div>
                            </div>

                            <div class="col-6 col-md-4">
                                <div class="form-check">
                                    <input class="form-check-input"
                                           type="radio"
                                           id="tipo_ti"
                                           name="tipo_usuario"
                                           value="Tecnico Informatica">
                                    <label class="form-check-label" for="tipo_ti">Téc. Informática</label>
                                </div>
                            </div>

                            <div class="col-6 col-md-4">
                                <div class="form-check">
                                    <input class="form-check-input"
                                           type="radio"
                                           id="tipo_vis"
                                           name="tipo_usuario"
                                           value="Visitante">
                                    <label class="form-check-label" for="tipo_vis">Visitante</label>
                                </div>
                            </div>

                            <div class="col-6 col-md-4">
                                <div class="form-check">
                                    <input class="form-check-input"
                                           type="radio"
                                           id="tipo_func"
                                           name="tipo_usuario"
                                           value="Funcionario">
                                    <label class="form-check-label" for="tipo_func">Funcionário</label>
                                </div>
                            </div>

                            <div class="col-6 col-md-4">
                                <div class="form-check">
                                    <input class="form-check-input"
                                           type="radio"
                                           id="tipo_seg"
                                           name="tipo_usuario"
                                           value="Seguranca do Trabalho">
                                    <label class="form-check-label" for="tipo_seg">Seg. Trabalho</label>
                                </div>
                            </div>

                            <div class="col-6 col-md-4">
                                <div class="form-check">
                                    <input class="form-check-input"
                                           type="radio"
                                           id="tipo_est"
                                           name="tipo_usuario"
                                           value="Estetica">
                                    <label class="form-check-label" for="tipo_est">Estética</label>
                                </div>
                            </div>
                        </div>
                    </fieldset>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary w-100">Continuar</button>
                    </div>

                </form>
            </div>
        </div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById("tela").value = params.get("tela") || "";
    </script>
</body>

</html>
