<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Cadastro</title>
</head>

<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="row w-100 bg-white p-4 shadow rounded">

            <div
                class="col-md-6 d-none d-md-flex justify-content-center align-items-center bg-warning bg-opacity-25 rounded">
                <img src="{{ url_for('static', filename='img/senac.png') }}" class="img-fluid" style="max-width: 625px;"
                    alt="Imagem do Senac">
            </div>

            <div class="col-md-6">
                <h2 class="text-center mb-4">Cadastre-se</h2>

                <form action="/salvar" method="POST">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Primeiro Nome</label>
                            <input type="text" name="primeiro_nome" class="form-control"
                                placeholder="Digite seu primeiro nome" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Sobrenome</label>
                            <input type="text" name="sobrenome" class="form-control" placeholder="Digite seu sobrenome"
                                required>
                        </div>

                        <div class="col-12 mb-3">
                            <label class="form-label">Data de nascimento</label>
                            <input type="date" name="data_nascimento" class="form-control" required>
                        </div>
                    </div>

                    <h5 class="text-center mt-3">Você é?</h5>

                    <div class="row mt-2">

                        <div class="col-6 col-md-4">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="tipo_usuario" value="Administracao"
                                    required>
                                <label class="form-check-label">Administração</label>
                            </div>
                        </div>

                        <div class="col-6 col-md-4">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="tipo_usuario" value="Massoterapia">
                                <label class="form-check-label">Massoterapia</label>
                            </div>
                        </div>

                        <div class="col-6 col-md-4">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="tipo_usuario"
                                    value="Tecnico Informatica">
                                <label class="form-check-label">Téc. Informática</label>
                            </div>
                        </div>

                        <div class="col-6 col-md-4">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="tipo_usuario" value="Visitante">
                                <label class="form-check-label">Visitante</label>
                            </div>
                        </div>

                        <div class="col-6 col-md-4">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="tipo_usuario" value="Funcionario">
                                <label class="form-check-label">Funcionário</label>
                            </div>
                        </div>

                        <div class="col-6 col-md-4">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="tipo_usuario"
                                    value="Seguranca do Trabalho">
                                <label class="form-check-label">Seg. Trabalho</label>
                            </div>
                        </div>

                        <div class="col-6 col-md-4">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="tipo_usuario" value="Estetica">
                                <label class="form-check-label">Estética</label>
                            </div>
                        </div>

                    </div>
                    
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary w-100">Continuar</button>
                    </div>

                </form>
            </div>

        </div>
    </div>

</body>

</html>
