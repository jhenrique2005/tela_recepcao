<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grande Ganhador!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #8357d4; color: white; }
        .winner-card {
            background: white;
            color: #333;
            border-radius: 25px;
            padding: 40px;
            margin-top: 100px;
            border: 8px solid #ffc107;
        }
        .confetti { font-size: 50px; }
    </style>
</head>
<body class="text-center">

    <div class="container">
        <div class="winner-card shadow-lg mx-auto" style="max-width: 600px;">
            <div class="confetti">🎉 🏆 🎉</div>
            <h1 class="display-4 fw-bold mb-4">Temos um Ganhador!</h1>
            
            <p class="lead">O número da sorte sorteado foi:</p>
            <div class="bg-warning d-inline-block px-5 py-2 rounded-pill mb-4">
                <span class="display-2 fw-bold text-dark">{{ ganhador.id }}</span>
            </div>

            <h2 class="mb-4">Parabéns, <br><strong>{{ ganhador.primeiro_nome }} {{ ganhador.sobrenome }}</strong>!</h2>

            <hr>
            <a href="/realizar-sorteio" class="btn btn-primary btn-lg">Sortear Novamente</a>
            <br>
            <a href="/" class="btn btn-link mt-3">Voltar ao Início</a>
        </div>
    </div>

</body>
</html>
